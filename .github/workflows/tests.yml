name: test

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: '0'
      DATABASE_URL: postgresql://steam:steam@localhost:5432/steamgames
      SECRET_KEY: test-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: '1440'
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -q