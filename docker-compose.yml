services:
  db:
    image: pgvector/pgvector:pg16
    container_name: steamgames-db
    environment:
      POSTGRES_DB: steamgames
      POSTGRES_USER: steam
      POSTGRES_PASSWORD: steam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steam -d steamgames"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
